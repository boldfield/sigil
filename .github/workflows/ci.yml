name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-flight runs on the same ref — keeps CI from stacking when
# pushes land in quick succession.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  RUST_BACKTRACE: 1
  SOURCE_DATE_EPOCH: "0"
  TZ: UTC

jobs:
  build-test:
    name: build + test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-14]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: install Boehm GC + lld (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgc-dev pkg-config lld clang

      - name: install Boehm GC (macOS)
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install bdw-gc pkg-config
          echo "PKG_CONFIG_PATH=$(brew --prefix)/opt/bdw-gc/lib/pkgconfig:${PKG_CONFIG_PATH:-}" >> "$GITHUB_ENV"

      # Rust toolchain pinned via rust-toolchain.toml; no explicit install.

      - name: cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock', 'rust-toolchain.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: cache Homebrew bottles
        if: runner.os == 'macOS'
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/Homebrew/downloads
          key: ${{ runner.os }}-brew-${{ hashFiles('.github/workflows/ci.yml') }}

      - name: rustfmt
        run: cargo fmt --all -- --check

      # Run the pod-safe verification script. It is a superset of fmt +
      # per-crate clippy + workspace check + runtime lib tests + the
      # discipline greps; its purpose in CI is to keep the pod-safe
      # path continuously exercised on both hosts (per Plan A2 task
      # 1.5.4). It does not replace the full build/test matrix below.
      - name: pod-verify (pod-safe subset)
        run: ./scripts/pod-verify.sh

      # Build the runtime crate first, then the compiler crate, then run
      # tests. Splitting the build into per-crate invocations keeps peak
      # memory lower than a single `cargo build --workspace`, which is
      # load-bearing on memory-constrained hosts where Cranelift's heavy
      # dependency tree co-compiles with the compiler crate.
      #
      # `rm` the cached staticlibs before the build: `cargo build -p
      # sigil-runtime` can otherwise skip rebuilding the `.a` when the
      # cached `target/` dir's per-unit fingerprints say it is fresh
      # but a pod-verify step earlier in the job has updated some
      # adjacent fingerprints (rlib / test-profile) such that cargo
      # declines to re-emit the staticlib. Dropping the `.a` forces an
      # unambiguous rebuild into the current source's symbol set.
      #
      # This `rm -f` line is **load-bearing**: removing it without
      # swapping the overall cache strategy (e.g. to
      # `Swatinem/rust-cache@v2`) will re-introduce the
      # `undefined reference to \`sigil_panic_arith_error\`` failure
      # that surfaced on PR #3's first CI run. See
      # `PLAN_A2_DEVIATIONS.md` `[CHORE]` entry for the full rationale
      # and forward plan.
      - name: build runtime
        run: |
          rm -f target/debug/libsigil_runtime.a target/release/libsigil_runtime.a
          cargo build -p sigil-runtime

      - name: build compiler
        run: cargo build -p sigil-compiler

      - name: clippy
        run: cargo clippy --no-deps --workspace --all-targets -- -D warnings

      - name: test
        run: cargo test --workspace --no-fail-fast

      # Plan 2026-05-08 Phase 6 Task 12 — validation evidence.
      # The `task_12_validation_profile_json_sigil_end_to_end` e2e
      # test writes a folded-stacks profile from examples/json.sigil
      # to $TMPDIR with a known prefix. This step renders that
      # profile to SVG via flamegraph.pl and uploads it as a build
      # artifact, so a maintainer (or anyone reviewing this PR) can
      # download a real flame graph rather than reading the textual
      # top-rows summary printed to the test's stderr.
      #
      # Best-effort: if the folded file isn't where we expect (e.g.
      # the e2e test was filtered out, or TMPDIR differs from
      # mktemp's default), the step prints a notice and moves on.
      # The test itself does not depend on this step succeeding.
      - name: render flame-graph evidence (Task 12)
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$GITHUB_WORKSPACE/profile-artifacts"
          # Collect every folded text the e2e test produced.
          # Pick up both the json.sigil run (if it captured samples)
          # and the fib_cps_perf evidence run (guaranteed to capture
          # samples — runs ~250-500 ms which dominates the 1 ms
          # SIGPROF period at 999 Hz). Either or both may be present.
          folded_files=$(find "${TMPDIR:-/tmp}" -maxdepth 2 -name 'sigil_e2e_json_validation*.txt' 2>/dev/null || true)
          if [ -z "$folded_files" ]; then
            echo "::notice::no folded profile found; Task 12 test may have been filtered or skipped"
            exit 0
          fi
          for f in $folded_files; do
            cp "$f" "$GITHUB_WORKSPACE/profile-artifacts/$(basename "$f")"
          done
          # Try to render an SVG. flamegraph.pl is a single Perl
          # script; download it inline to keep the workflow self-
          # contained (vs depending on apt's flamegraph package which
          # doesn't exist on macos-14 runners). Pinned to a tagged
          # release SHA so the URL is stable. Fall back gracefully
          # if the download or rendering fails — the folded text is
          # still uploaded as the primary artifact.
          flamegraph_url="https://raw.githubusercontent.com/brendangregg/FlameGraph/cd9ee4c4449775a2f867acf31c84b7fe4b132ad5/flamegraph.pl"
          curl -sSfL --max-time 30 -o /tmp/flamegraph.pl "$flamegraph_url" || {
            echo "::notice::flamegraph.pl download failed; uploading folded text only"
            exit 0
          }
          chmod +x /tmp/flamegraph.pl
          for f in $folded_files; do
            base=$(basename "$f" .txt)
            /tmp/flamegraph.pl --title="json.sigil — sigil v2 profile-data validation (${{ matrix.os }})" \
              --countname="samples" \
              < "$f" \
              > "$GITHUB_WORKSPACE/profile-artifacts/${base}.svg" || {
              echo "::notice::flamegraph.pl render failed for $f; folded text still uploaded"
            }
          done
          ls -la "$GITHUB_WORKSPACE/profile-artifacts/"

      - name: upload flame-graph artifacts (Task 12)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: profile-validation-${{ matrix.os }}
          path: profile-artifacts/
          if-no-files-found: ignore
          retention-days: 14

      - name: no-HashMap grep check
        shell: bash
        run: |
          # Plan A1 §0.3: compiler crate must not use HashMap/HashSet.
          # Tests modules are allowed an explicit #[allow]; the grep below is
          # coarse and keeps the rule mechanical.
          set -euo pipefail
          if grep -REn 'HashMap|HashSet' compiler/src/ \
               --include='*.rs' \
               --exclude-dir='errors' \
             | grep -v -E '//.*HashMap|//.*HashSet'; then
            echo "compiler/src/ contains HashMap/HashSet references — see clippy.toml rules." >&2
            exit 1
          fi
          echo "no-HashMap grep: OK"

      - name: interior-pointer check
        run: ./scripts/check-no-interior-pointers.sh

      - name: commit-message format
        if: github.event_name == 'pull_request'
        shell: bash
        run: ./scripts/check-commit-messages.sh "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}"

      - name: reproducibility
        run: ./scripts/reproducibility.sh

      - name: smoke
        run: ./scripts/smoke.sh

      # Plan B Task 4.5.4: the three charter invariants (deep-recursion
      # trampoline, multi-shot continuation, selective CPS). Each is
      # SKIPped until its driving example and e2e test land in Stage 5/6.
      # The step exists from Stage 4.5 so the invariants remain visible
      # in CI logs and cannot be dropped on the way to Plan B's real
      # acceptance gate.
      - name: plan-b invariants
        run: ./scripts/plan-b-invariants.sh

  # Cold-checkout acceptance for Plan A2 task 1.5.5:
  # `rm -rf target && cargo test --workspace` must pass twice in
  # succession on both hosts. Separate from `build-test` because that
  # job caches `target/` and so cannot itself verify cold behaviour.
  # Slow (~10 min Linux, up to ~15 min macOS); acceptable as the price
  # of proving the invariant.
  cold-checkout-test:
    name: cold-checkout test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-14]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: install Boehm GC + lld (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgc-dev pkg-config lld clang

      - name: install Boehm GC (macOS)
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install bdw-gc pkg-config
          echo "PKG_CONFIG_PATH=$(brew --prefix)/opt/bdw-gc/lib/pkgconfig:${PKG_CONFIG_PATH:-}" >> "$GITHUB_ENV"

      # No actions/cache — the whole point of this job is to verify
      # that a true cold `cargo test --workspace` succeeds.

      - name: cold run 1 of 2
        run: |
          rm -rf target
          cargo test --workspace --no-fail-fast

      - name: cold run 2 of 2
        run: |
          rm -rf target
          cargo test --workspace --no-fail-fast
