name: release

on:
  push:
    tags:
      - 'v*'
  # Manual trigger — useful for retroactively releasing an existing
  # tag (e.g., v1.0.0 was created before this workflow existed) and
  # for re-running a failed build without re-pushing the tag.
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (defaults to the workflow ref)'
        required: false
        type: string

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  SOURCE_DATE_EPOCH: "0"
  TZ: UTC

# `GITHUB_TOKEN` defaults to read-only for public repositories. The
# release-upload step (`gh release create` / `upload`) needs `contents:
# write` to attach tarballs. Surfaced as HTTP 403 "Resource not
# accessible by integration" on the first run against v1.0.0.
permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Build the Linux binary on the OLDEST supported glibc so the
          # released artifact runs on older hosts too. ubuntu-22.04 = GLIBC
          # 2.35; a binary linked here runs on glibc >= 2.35 (incl. the
          # fleet's 2.36 worker pods). Building on 24.04 (GLIBC 2.39) made
          # the binary refuse to run anywhere with glibc < 2.39.
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - os: macos-14
            target: aarch64-apple-darwin
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}
          # Need the full history so the changelog generator (below)
          # can walk back to the previous tag.
          fetch-depth: 0

      - name: install Boehm GC + lld (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgc-dev pkg-config lld clang

      - name: install Boehm GC (macOS)
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install bdw-gc pkg-config
          echo "PKG_CONFIG_PATH=$(brew --prefix)/opt/bdw-gc/lib/pkgconfig:${PKG_CONFIG_PATH:-}" >> "$GITHUB_ENV"

      # Rust toolchain pinned via rust-toolchain.toml.

      - name: build release artifacts
        run: |
          rm -f target/debug/libsigil_runtime.a target/release/libsigil_runtime.a
          cargo build --release -p sigil-runtime
          cargo build --release -p sigil-compiler

      - name: build static Boehm GC
        run: |
          ./scripts/build-static-boehm.sh ./target/release/boehm

      - name: smoke (compile + run hello)
        env:
          SIGIL_GC_LIB: ${{ github.workspace }}/target/release/boehm/libgc.a
        run: |
          ./target/release/sigil examples/hello.sigil -o /tmp/sigil-release-hello
          /tmp/sigil-release-hello

      - name: stage release tarball
        id: stage
        shell: bash
        run: |
          set -euo pipefail
          # Resolve the tag we're building. workflow_dispatch may pass
          # one in; otherwise the trigger was a tag push, so github.ref
          # is `refs/tags/<name>`.
          TAG="${{ inputs.tag }}"
          if [ -z "$TAG" ]; then
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          # Sanitise — bail loudly if we're not building a tagged
          # version (workflow_dispatch defaults are easy to fat-finger).
          if [[ ! "$TAG" =~ ^v[0-9] ]]; then
            echo "::error::release.yml expects a v* tag; got '$TAG'"
            exit 1
          fi
          STAGE="sigil-${TAG}-${{ matrix.target }}"
          mkdir -p "$STAGE/bin" "$STAGE/lib"
          cp target/release/sigil "$STAGE/bin/sigil"
          cp target/release/libsigil_runtime.a "$STAGE/lib/libsigil_runtime.a"
          cp target/release/boehm/libgc.a "$STAGE/lib/libgc.a"
          cp LICENSE "$STAGE/LICENSE" 2>/dev/null || true
          # Minimal install / run notes that ship in the tarball.
          cat > "$STAGE/README.md" <<EOF
          # Sigil ${TAG} (${{ matrix.target }})

          Compiled language designed around LLM authorship. v1 spec
          lives at https://sigillang.ai/language/ — drop the raw md
          (https://sigillang.ai/language.raw.md) into a system prompt
          and ask the model to write Sigil.

          ## Install

          \`\`\`
          tar xzf sigil-${TAG}-${{ matrix.target }}.tar.gz
          export PATH="\$PWD/sigil-${TAG}-${{ matrix.target }}/bin:\$PATH"
          # Or move bin/sigil + lib/ into your prefix of choice.
          # \`sigil\` finds the runtime and GC libraries via \`../lib/\`
          # from its own directory.
          \`\`\`

          ## Quick start

          \`\`\`
          cat > hello.sigil <<EOF2
          import std.io
          fn main() -> Int ![IO] {
            perform IO.println("hello, world");
            0
          }
          EOF2
          sigil hello.sigil -o hello
          ./hello
          \`\`\`

          ## Links

          - Site: https://sigillang.ai/
          - Source: https://github.com/boldfield/sigil
          - Spec (LLM-ready): https://sigillang.ai/language.raw.md
          EOF
          tar czf "$STAGE.tar.gz" "$STAGE"
          shasum -a 256 "$STAGE.tar.gz" > "$STAGE.tar.gz.sha256"
          ls -lh "$STAGE.tar.gz" "$STAGE.tar.gz.sha256"
          echo "tarball=$STAGE.tar.gz" >> "$GITHUB_OUTPUT"
          echo "sha=$STAGE.tar.gz.sha256" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: upload tarball + sha to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${{ steps.stage.outputs.tag }}"
          TARBALL="${{ steps.stage.outputs.tarball }}"
          SHA="${{ steps.stage.outputs.sha }}"
          # Create the release if it doesn't exist yet. The first matrix
          # job to reach this step wins; subsequent jobs fail the create
          # (already-exists) and fall through to the upload.
          gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1 || \
            gh release create "$TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --title "Sigil $TAG" \
              --notes "See https://github.com/$GITHUB_REPOSITORY/releases/tag/$TAG for the human-written release notes (if any). Binary archives are attached below for $TAG."
          # `--clobber` so re-running the workflow on the same tag (via
          # workflow_dispatch) overwrites stale assets instead of erroring.
          gh release upload "$TAG" "$TARBALL" "$SHA" \
            --repo "$GITHUB_REPOSITORY" \
            --clobber

  # Regenerate the published docs/ tree from canonical sources and
  # open a PR against main. This replaces the per-commit
  # `check-docs-sync` CI gate: between tags we accept that
  # `docs/*.md` may lag the canonical source, and let the release cut
  # be the sync point.
  #
  # PR (not direct push) because main has a "Changes must be made
  # through a pull request" repo rule that the github-actions[bot]
  # token can't bypass. Best-effort `--auto --squash` lets the merge
  # land hands-off when the repo allows it; otherwise the PR sits
  # open for manual merge (as PR #193 did for v1.1.0).
  #
  # Skipped on workflow_dispatch (used for retroactively building
  # old tags — rewriting docs/ on top of an old build would be a
  # footgun) and on tags landing without a push event.
  sync-docs:
    name: sync docs/ to main
    runs-on: ubuntu-24.04
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          # Sync against current main, not the tagged commit. The tag
          # is the trigger; the resulting docs commit belongs on the
          # branch that the next release will be cut from.
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: run sync-docs
        run: ./scripts/sync-docs.sh
      - name: open sync PR if changed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if git diff --quiet docs/; then
            echo "docs/ unchanged — nothing to sync"
            exit 0
          fi
          TAG="${GITHUB_REF#refs/tags/}"
          BRANCH="docs-sync-${TAG}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add docs/
          git commit -m "Sync docs/ for ${TAG}"
          # Regular push first; on rerun of the same tag (workflow_-
          # dispatch is excluded, but defensively for re-pushed tags)
          # the branch already exists, so fall back to force.
          git push origin "$BRANCH" || git push --force origin "$BRANCH"
          # Reuse an existing PR for this branch if present (rerun
          # case); otherwise open one.
          if gh pr view "$BRANCH" --json number >/dev/null 2>&1; then
            echo "PR for $BRANCH already exists — refreshed by push"
          else
            gh pr create \
              --title "Sync docs/ for ${TAG}" \
              --body "Automated sync of docs/ from canonical sources (spec/language.md, CAPABILITIES.md, SIGIL_FOR_LLMS.md) triggered by tag ${TAG}. Merge to publish to sigillang.ai." \
              --base main \
              --head "$BRANCH"
          fi
          # Best-effort auto-merge. Succeeds if the repo allows
          # auto-merge; falls through cleanly if not (the PR is open
          # for manual merge).
          gh pr merge "$BRANCH" --auto --squash --delete-branch || \
            echo "auto-merge unavailable or PR has unmet requirements — open for manual merge"
