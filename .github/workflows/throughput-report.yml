name: throughput-report

# Plan E2 throughput-report measurement workflow. Triggered
# manually via the Actions UI ("Run workflow") on the branch
# holding the throughput-report PR. Builds + measures the Sigil
# compiler at two checkpoints — the pre-checkpoint SHA supplied
# as an input (Phase 2 used the pre-Phase-2 SHA; Phase 3 uses
# the pre-Phase-3 SHA at ca29d20…) and the branch's current
# HEAD — across a workload suite, then uploads the per-workload
# JSON files + a generated markdown summary as artifacts. The
# PR author then pastes the artifact contents into the
# throughput report doc.
#
# Why workflow_dispatch only (no push/pull_request trigger):
# - Each run builds the compiler twice (~10 min/OS × 2 OS = ~20 min).
#   Auto-triggering on every push would saturate the actions queue
#   for what is effectively a one-shot measurement per PR.
# - Wall-clock measurements need a quiet runner; we don't want
#   competing CI lanes for the same commit muddying the data.
#
# The workflow is checkpointed in measurement.yml on both lanes
# (ubuntu-24.04 + macos-14) so the report can attribute deltas to
# the same platform on each side.

on:
  workflow_dispatch:
    inputs:
      pre_sha:
        description: "Pre-checkpoint commit SHA (default = pre-Phase-3)"
        required: true
        default: "ca29d2061f2897cb824d8328c92a8d945da313cc"
      runs:
        description: "Measurement runs per workload"
        required: true
        default: "5"
      heap_budget_kb:
        description: "Optional: pin Boehm max heap to N KB (forces GC at low threshold for mark-phase measurement). Empty = no budget."
        required: false
        default: ""
      force_gc_every_n_allocs:
        description: "Optional: force GC_gcollect() every N allocations (mark-phase savings measurement). Empty = no injection."
        required: false
        default: ""
      alloc_elide_wrap:
        description: "Optional: SIGIL_ALLOC_ELIDE_WRAP on the POST side only (plan body: elision env var set on post, unset on pre). Strict `1` opts in. Empty = no elision."
        required: false
        default: ""

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  RUST_BACKTRACE: 1
  SOURCE_DATE_EPOCH: "0"
  TZ: UTC

jobs:
  measure:
    name: measure (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-14]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          # Need full history so we can `git worktree add` at the
          # pre-Phase-2 SHA without re-fetching mid-job.
          fetch-depth: 0

      - name: install Boehm GC + lld + GNU time (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgc-dev pkg-config lld clang time
          # The `time` package installs /usr/bin/time (GNU time, supports
          # -v). bash's builtin `time` doesn't support -v / -o and is
          # not what we want; ensure /usr/bin/time is present.
          /usr/bin/time --version

      - name: install Boehm GC (macOS)
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install bdw-gc pkg-config
          echo "PKG_CONFIG_PATH=$(brew --prefix)/opt/bdw-gc/lib/pkgconfig:${PKG_CONFIG_PATH:-}" >> "$GITHUB_ENV"
          # macOS's /usr/bin/time -l ships with the base system.

      - name: workload + script SHAs sanity check
        run: |
          test -f examples/descriptor_cache_stress.sigil
          test -f examples/tree_stress_repeat_large.sigil
          test -f examples/deep_sync_call_chain.sigil
          test -x scripts/measure-throughput.sh
          test -x scripts/diff-throughput.py

      - name: capture libgc version
        # Pin the libgc version observed at measurement time into an
        # env var so the report doc's reproducibility section can name
        # the exact runtime version. Different libgc versions can have
        # different mark-phase + allocator-pacing behaviour; this is
        # the cross-checkpoint comparability guardrail.
        run: |
          LIBGC_VERSION=$(pkg-config --modversion bdw-gc)
          echo "LIBGC_VERSION=${LIBGC_VERSION}" >> "$GITHUB_ENV"
          echo "libgc ${LIBGC_VERSION} (observed at ${{ matrix.os }})"

      # ----------------------------------------------------------------
      # POST-Phase-2 build + measure (current branch HEAD).
      # ----------------------------------------------------------------
      - name: post — cargo build --release
        run: |
          cargo build --release -p sigil-compiler -p sigil-runtime

      - name: post — compile workloads
        run: |
          mkdir -p post-bins
          for w in fib_perf fib_cps_perf tree tree_stress_repeat tree_stress_repeat_large descriptor_cache_stress deep_sync_call_chain; do
            ./target/release/sigil "examples/${w}.sigil" -o "post-bins/${w}"
          done

      - name: post — measure workloads
        env:
          # Plan E2 Phase 3 GC-time follow-up — optional Boehm max
          # heap pin. Empty input → unset → runtime treats as
          # "no budget" (matches Phase 2 / Phase 3 report behaviour).
          # Non-empty → `sigil_gc_init` calls `GC_set_max_heap_size`
          # at the value's byte count (KB × 1024) to force collections
          # at low threshold for mark-phase measurement.
          SIGIL_MAX_HEAP_SIZE_KB: ${{ inputs.heap_budget_kb }}
          # Plan E2 Phase 3 GC-time follow-up #2 — optional forced
          # `GC_gcollect()` injection at fixed N-allocation cadence.
          # Empty → no injection. Non-empty positive integer → fire
          # a collection every Nth `sigil_alloc` call. Used to
          # decompose Phase 3's mark-phase savings vs precise-walker
          # cost at workload scale; see
          # `compiler/docs/plan-e2-phase-3-gc-time-followup.md`.
          SIGIL_FORCE_GC_EVERY_N_ALLOCS: ${{ inputs.force_gc_every_n_allocs }}
          # POST-side only per plan body. Pre-side measure step does
          # NOT wire this; strict `"1"` opts in at runtime.
          SIGIL_ALLOC_ELIDE_WRAP: ${{ inputs.alloc_elide_wrap }}
        run: |
          mkdir -p throughput-data/post
          for w in fib_perf fib_cps_perf tree tree_stress_repeat tree_stress_repeat_large descriptor_cache_stress deep_sync_call_chain; do
            scripts/measure-throughput.sh "post-bins/${w}" "${{ inputs.runs }}" \
              > "throughput-data/post/${w}.json"
            echo "--- post/${w} ---"
            cat "throughput-data/post/${w}.json"
          done

      # ----------------------------------------------------------------
      # PRE-checkpoint worktree at the input SHA. The throughput-
      # report-only workloads (descriptor_cache_stress, tree_stress
      # _repeat_large from Phase 2's report; deep_sync_call_chain
      # added by Phase 3's report) plus the harness scripts live on
      # this branch and may not exist at the PRE SHA. Cherry-pick
      # them onto the worktree per the plan body's documented
      # methodology. The `cp` is gated on `! -f` so a PRE SHA that
      # already carries a given file (e.g., the Phase 2 workloads
      # when measuring Phase 3 at PRE=ca29d20) doesn't clobber the
      # actually-pre-existing version with the branch HEAD's copy —
      # measurement correctness depends on the workload source
      # being identical pre/post wherever possible.
      # ----------------------------------------------------------------
      - name: pre — worktree at ${{ inputs.pre_sha }}
        run: |
          git worktree add /tmp/pre-checkpoint ${{ inputs.pre_sha }}
          cd /tmp/pre-checkpoint
          git log --oneline -1
          for w in descriptor_cache_stress tree_stress_repeat_large deep_sync_call_chain; do
            src="examples/${w}.sigil"
            if [[ ! -f "${src}" ]]; then
              cp "${{ github.workspace }}/${src}" "${src}"
              echo "cherry-picked ${src} (absent at PRE SHA)"
              # PR #173 (qualified-only imports) added `use std.*;`
              # lines to every workload. The pre-PR-#173 parser
              # rejects them with E0010. Strip the `use` lines on
              # cherry-pick so the pre-checkpoint compiler accepts
              # the source — pre-PR-#173 `import std.foo` already
              # brought every name in `std.foo` into the bare
              # namespace, so the stripped form is semantically
              # equivalent on the pre side. The sed `-i.bak` + rm
              # idiom works on both GNU sed (linux) and BSD sed
              # (macos) without per-OS branching.
              sed -i.bak '/^use .*;$/d' "${src}"
              rm -f "${src}.bak"
            else
              echo "PRE SHA already has ${src}; keeping its version"
            fi
          done
          mkdir -p scripts
          for s in scripts/measure-throughput.sh scripts/diff-throughput.py; do
            if [[ ! -f "${s}" ]]; then
              cp "${{ github.workspace }}/${s}" "${s}"
              chmod +x "${s}"
              echo "cherry-picked ${s} (absent at PRE SHA)"
            else
              echo "PRE SHA already has ${s}; keeping its version"
            fi
          done

      # Plan E2 Phase 3 GC-time follow-up #2 — cherry-pick the
      # `SIGIL_FORCE_GC_EVERY_N_ALLOCS` injection mechanism onto
      # the pre-checkpoint worktree's `runtime/src/gc.rs`. Without
      # this, the pre side runs unconstrained and post runs under
      # forced injection — apples to oranges. The patch lives at
      # `scripts/pre-checkpoint-cadence-patch.diff` (tracked +
      # reviewable) and applies cleanly against the pre-Phase-3
      # SHA `ca29d20…` (verified at patch authoring time). Gated
      # on the input being non-empty so the workflow stays a no-op
      # for runs that aren't measuring force-injection.
      - name: pre — patch in cadence injection
        if: ${{ inputs.force_gc_every_n_allocs != '' }}
        run: |
          cd /tmp/pre-checkpoint
          git apply --check "${{ github.workspace }}/scripts/pre-checkpoint-cadence-patch.diff"
          git apply "${{ github.workspace }}/scripts/pre-checkpoint-cadence-patch.diff"
          # Echo the modified region for the audit trail.
          echo "--- patched pre-side gc.rs head ---"
          sed -n '/FORCE_GC_ALLOC_COUNTER/,/^static FORCE_GC_CADENCE/p' runtime/src/gc.rs | head -20

      - name: pre — cargo build --release
        run: |
          cd /tmp/pre-checkpoint
          cargo build --release -p sigil-compiler -p sigil-runtime

      - name: pre — compile workloads
        run: |
          cd /tmp/pre-checkpoint
          mkdir -p ${{ github.workspace }}/pre-bins
          for w in fib_perf fib_cps_perf tree tree_stress_repeat tree_stress_repeat_large descriptor_cache_stress deep_sync_call_chain; do
            ./target/release/sigil "examples/${w}.sigil" \
              -o "${{ github.workspace }}/pre-bins/${w}"
          done

      - name: pre — measure workloads
        env:
          # Plan E2 Phase 3 GC-time follow-up — mirror the post-step's
          # env wiring so pre/post are measured under the same budget
          # pressure. Pre-checkpoint runtime does not yet honor this
          # env var (the read site landed in this PR); the value is
          # set anyway so the runtime, post-merge, can apply it
          # symmetrically when re-running the workflow against a SHA
          # that has the env var read in place.
          SIGIL_MAX_HEAP_SIZE_KB: ${{ inputs.heap_budget_kb }}
          # Plan E2 Phase 3 GC-time follow-up #2 — mirror the
          # post-step's force-injection env wiring. The pre-side
          # gc.rs has been patched in by the "pre — patch in cadence
          # injection" step above (when this input is non-empty),
          # so the env var is honored symmetrically with the post
          # side. Required for an apples-to-apples mark-phase
          # comparison under forced injection.
          SIGIL_FORCE_GC_EVERY_N_ALLOCS: ${{ inputs.force_gc_every_n_allocs }}
        run: |
          mkdir -p throughput-data/pre
          for w in fib_perf fib_cps_perf tree tree_stress_repeat tree_stress_repeat_large descriptor_cache_stress deep_sync_call_chain; do
            scripts/measure-throughput.sh "pre-bins/${w}" "${{ inputs.runs }}" \
              > "throughput-data/pre/${w}.json"
            echo "--- pre/${w} ---"
            cat "throughput-data/pre/${w}.json"
          done

      # ----------------------------------------------------------------
      # Produce a markdown summary the PR author can paste into the
      # throughput report's "Deltas" section.
      # ----------------------------------------------------------------
      - name: render deltas summary
        run: |
          mkdir -p throughput-data
          BUDGET="${{ inputs.heap_budget_kb }}"
          if [[ -z "$BUDGET" ]]; then BUDGET="(none)"; fi
          INJECT="${{ inputs.force_gc_every_n_allocs }}"
          if [[ -z "$INJECT" ]]; then INJECT="(none)"; fi
          ELIDE="${{ inputs.alloc_elide_wrap }}"
          if [[ -z "$ELIDE" ]]; then ELIDE="(none)"; fi
          {
            echo "## Deltas — ${{ matrix.os }}"
            echo ""
            echo "Pre SHA: \`${{ inputs.pre_sha }}\`"
            echo "Post SHA: \`${{ github.sha }}\`"
            echo "Runs per workload: ${{ inputs.runs }}"
            echo "libgc version: \`${LIBGC_VERSION}\`"
            echo "Heap budget: \`${BUDGET}\` KB"
            echo "Force-GC cadence: \`${INJECT}\` allocations"
            echo "Alloc-elide-wrap (POST only): \`${ELIDE}\`"
            echo ""
            for w in fib_perf fib_cps_perf tree tree_stress_repeat tree_stress_repeat_large descriptor_cache_stress deep_sync_call_chain; do
              scripts/diff-throughput.py "${w}" \
                "throughput-data/pre/${w}.json" \
                "throughput-data/post/${w}.json"
              echo ""
            done
          } > "throughput-data/deltas-${{ matrix.os }}.md"
          cat "throughput-data/deltas-${{ matrix.os }}.md"

      - name: upload throughput JSON + deltas
        uses: actions/upload-artifact@v4
        with:
          name: throughput-data-${{ matrix.os }}
          path: throughput-data/
          retention-days: 30
